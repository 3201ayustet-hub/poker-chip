<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Poker Chip ver1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div>
        <p class="eyebrow">Poker Chip ver1</p>
        <h1>チップ管理</h1>
      </div>
      <button id="resetBtn" class="ghost small">Reset</button>
    </header>

    <main>
      <section id="home" class="screen active">
        <div class="hero-card">
          <div class="chip-icon">♠</div>
          <h2>リアルポーカーを<br>スマホで管理</h2>
          <p>FirebaseなしのUI確認版です。ver2で共通URL同期に対応します。</p>
        </div>

        <div class="card stack">
          <label>あなたの名前</label>
          <input id="nameInput" value="Tetsuya" maxlength="12" />

          <label>初期チップ</label>
          <input id="stackInput" type="number" value="2000" min="100" step="100" />

          <label>ゲームコード</label>
          <input id="codeInput" value="POKER01" maxlength="10" />

          <button id="createBtn" class="primary">ゲームを作成</button>
          <button id="joinBtn" class="secondary">ゲームに参加</button>
        </div>
      </section>

      <section id="game" class="screen">
        <div class="game-head">
          <div>
            <p class="eyebrow">GAME <span id="gameCode">POKER01</span></p>
            <h2 id="turnText">あなたの番</h2>
          </div>
          <div class="phase-pill" id="phaseText">Preflop</div>
        </div>

        <section class="pot-grid">
          <div class="pot-card main-pot">
            <span>Pot</span>
            <strong id="potTotal">0</strong>
          </div>
          <div class="pot-card">
            <span>Call</span>
            <strong id="toCall">0</strong>
          </div>
          <div class="pot-card">
            <span>Main</span>
            <strong id="mainPot">0</strong>
          </div>
          <div class="pot-card">
            <span>Side</span>
            <strong id="sidePot">0</strong>
          </div>
        </section>

        <section class="my-panel">
          <div>
            <p class="eyebrow">PLAYER</p>
            <h3 id="myName">Tetsuya</h3>
          </div>
          <div class="my-numbers">
            <div><span>残チップ</span><b id="myStack">2000</b></div>
            <div><span>今回ベット</span><b id="myBet">0</b></div>
          </div>
          <p id="statusText" class="status-text">アクションを選択してください</p>
        </section>

        <section class="raise-panel" id="raisePanel">
          <div class="raise-top">
            <b>Raise / Bet</b>
            <button id="closeRaise" class="ghost small">閉じる</button>
          </div>
          <div class="amount-display" id="raiseAmount">100</div>
          <div class="quick-grid">
            <button data-add="50">+50</button>
            <button data-add="100">+100</button>
            <button data-add="200">+200</button>
            <button data-add="500">+500</button>
            <button data-pot="half">Half Pot</button>
            <button data-pot="pot">Pot</button>
          </div>
          <button id="confirmRaise" class="primary">決定</button>
        </section>

        <section class="players card">
          <div class="section-title">
            <b>Players</b>
            <span>ホスト確認用</span>
          </div>
          <div id="playerList"></div>
        </section>

        <section class="host card">
          <div class="section-title"><b>Host Panel</b><span>ver1 demo</span></div>
          <div class="host-grid">
            <button id="nextPhase" class="secondary">次フェーズ</button>
            <button id="awardBtn" class="secondary">勝者へPot</button>
            <button id="undoBtn" class="secondary">Undo</button>
            <button id="newHandBtn" class="secondary">次ハンド</button>
          </div>
        </section>
      </section>
    </main>

    <nav id="actionBar" class="action-bar hidden">
      <button id="foldBtn" class="danger">Fold</button>
      <button id="checkCallBtn" class="primary">Check</button>
      <button id="raiseBtn" class="primary">Raise</button>
      <button id="allInBtn" class="allin">All-in</button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
